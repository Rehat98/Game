<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none" stroke="#1A1A1A" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" preserveAspectRatio="xMidYMid slice">
  <g opacity="0.18">
    <!-- top-left: sparkle cluster -->
    <g transform="translate(110 110)">

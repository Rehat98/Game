<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Pictok — resetting…</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { margin: 0; min-height: 100dvh; background: #FEF3D9; color: #1A1A1A;
      font-family: system-ui, -apple-system, sans-serif; font-weight: 700;
      display: flex; align-items: center; justify-content: center; padding: 24px;
      text-align: center; }
    p { margin: 4px 0; }
    .lead { font-size: 20px; }
    .sub { opacity: 0.6; font-size: 14px; }
  </style>
</head>
<body>
  <div>
    <p class="lead">Refreshing Pictok…</p>
    <p class="sub" id="status">clearing service worker + caches</p>
  </div>
  <script>
    (async () => {
      const set = (t) => document.getElementById('status').textContent = t;
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          for (const r of regs) await r.unregister();
        }
      } catch {}
      try {
        if (window.caches) {
          const names = await caches.keys();
          await Promise.all(names.map(n => caches.delete(n)));
        }
      } catch {}
      set('done — opening Pictok…');
      // small delay so the user sees the reassuring message
      setTimeout(() => { location.replace('/'); }, 350);
    })();
  </script>
</body>
</html>

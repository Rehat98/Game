name: Pictok

options:
  bundleIdPrefix: com.rehatchugh
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"

targets:
  Pictok:
    type: application
    platform: iOS
    sources:
      - path: Pictok
        excludes:
          - "Resources/Sounds/*.py"
          - "Resources/Assets.xcassets/AppIcon.appiconset/*.svg"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rehatchugh.pictok
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Pictok
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
        ENABLE_PREVIEWS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_TEAM: "97S862UPYS"
        CODE_SIGN_STYLE: Automatic

  PictokTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PictokTests
    dependencies:
      - target: Pictok
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rehatchugh.pictok.tests
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        DEVELOPMENT_TEAM: "97S862UPYS"
        CODE_SIGN_STYLE: Automatic

schemes:
  Pictok:
    build:
      targets:
        Pictok: all
        PictokTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PictokTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
